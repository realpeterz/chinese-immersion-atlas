<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Chinese Immersion Atlas</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3EDE2; --paper2:#EAE2D2; --ink:#211A14; --ink-soft:#5C5347;
    --cinnabar:#C2401C; --cinnabar-deep:#9A3014; --jade:#1F7A5E; --gold:#B5862A;
    --line:#D8CDB8; --shadow:rgba(33,26,20,.16);
    --ocean:#CCDAD9; --land:#EFE3CC; --border:#B49A6B; --stateline:#D2BE97;
    --san:'DM Sans',system-ui,sans-serif; --serif:'Fraunces',Georgia,serif;
  }
  .lbl-country,.lbl-state,.lbl-city{background:none;border:0;box-shadow:none;white-space:nowrap;pointer-events:none}
  .lbl-country span{font-family:var(--serif);font-weight:600;color:#76664A;font-size:14px;
    letter-spacing:.04em;text-transform:uppercase;
    text-shadow:0 1px 0 rgba(255,255,255,.85),0 0 4px rgba(243,237,226,.9)}
  .lbl-state span{font-family:var(--san);font-weight:600;color:#897A5B;font-size:11px;
    letter-spacing:.05em;text-transform:uppercase;
    text-shadow:0 1px 0 rgba(255,255,255,.9),0 0 3px rgba(243,237,226,.9)}
  .lbl-city{display:flex;align-items:center;gap:4px;transform:translateX(3px)}
  .lbl-city b{font-family:var(--san);font-weight:500;color:#5C5347;font-size:11px;
    text-shadow:0 1px 0 rgba(255,255,255,.95),0 0 3px rgba(243,237,226,.95)}
  .lbl-city i{width:4px;height:4px;border-radius:50%;background:#94855F;flex:0 0 auto;
    box-shadow:0 0 0 1.5px rgba(255,255,255,.7)}
  /* layer switcher */
  .leaflet-control-layers{
    border:1px solid var(--line)!important;border-radius:10px!important;
    box-shadow:0 4px 16px var(--shadow)!important;background:rgba(252,250,244,.96)!important;
    backdrop-filter:blur(6px);overflow:hidden}
  .leaflet-control-layers-toggle{background-image:none!important;width:34px!important;height:34px!important;
    position:relative}
  .leaflet-control-layers-toggle::after{content:"";position:absolute;inset:8px;
    background:no-repeat center/contain url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23211A14' stroke-width='1.7' stroke-linejoin='round'><polygon points='12 2 22 8.5 12 15 2 8.5'/><polyline points='2 15.5 12 22 22 15.5'/></svg>")}
  .leaflet-control-layers-expanded{padding:8px 10px!important;font-family:var(--san);font-size:13px;color:var(--ink)}
  .leaflet-control-layers-expanded label{display:flex;align-items:center;gap:6px;margin:3px 0;cursor:pointer}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{font-family:var(--san);color:var(--ink);background:var(--paper);overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}

  /* ---------- Header ---------- */
  header{
    position:relative;z-index:1200;flex:0 0 auto;
    background:
      radial-gradient(120% 140% at 0% 0%, rgba(194,64,28,.10), transparent 55%),
      linear-gradient(180deg,#FBF7EE,var(--paper));
    border-bottom:1px solid var(--line);
    padding:11px 16px 10px;
    display:flex;align-items:center;gap:14px;
  }
  .seal{
    flex:0 0 auto;width:42px;height:42px;border-radius:9px;
    background:linear-gradient(160deg,var(--cinnabar),var(--cinnabar-deep));
    color:#FBEFE2;display:grid;place-items:center;
    font-family:var(--serif);font-weight:600;font-size:26px;line-height:1;
    box-shadow:0 4px 14px rgba(154,48,20,.34), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .titles{display:flex;flex-direction:column;min-width:0}
  h1{
    font-family:var(--serif);font-weight:600;font-size:23px;letter-spacing:-.01em;
    margin:0;line-height:1;white-space:nowrap;
  }
  h1 em{font-style:italic;color:var(--cinnabar)}
  .sub{font-size:12px;color:var(--ink-soft);margin-top:3px;letter-spacing:.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .count{
    margin-left:auto;flex:0 0 auto;text-align:right;font-family:var(--serif);
    line-height:.95;
  }
  .count b{display:block;font-size:27px;font-weight:600;color:var(--cinnabar)}
  .count span{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-family:var(--san)}

  /* ---------- Controls ---------- */
  .controls{
    flex:0 0 auto;z-index:1100;background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:9px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  }
  .search{position:relative;flex:1 1 200px;min-width:150px}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);
    width:15px;height:15px;stroke:var(--ink-soft);pointer-events:none}
  .search input{
    width:100%;padding:9px 30px 9px 32px;border:1px solid var(--line);
    border-radius:9px;background:#FCFAF4;font-family:var(--san);font-size:14px;color:var(--ink);
    transition:border-color .15s, box-shadow .15s;
  }
  .search input:focus{outline:none;border-color:var(--cinnabar);
    box-shadow:0 0 0 3px rgba(194,64,28,.13)}
  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);
    border:0;background:transparent;color:var(--ink-soft);font-size:17px;cursor:pointer;
    padding:2px 4px;line-height:1;display:none}
  select{
    appearance:none;-webkit-appearance:none;
    padding:9px 28px 9px 11px;border:1px solid var(--line);border-radius:9px;
    background:#FCFAF4 url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' fill='none' stroke='%235C5347' stroke-width='1.6'><path d='M1 1l4 4 4-4'/></svg>") no-repeat right 10px center;
    font-family:var(--san);font-size:13px;color:var(--ink);cursor:pointer;
    transition:border-color .15s;
  }
  select:focus{outline:none;border-color:var(--cinnabar)}
  .btn{
    padding:9px 13px;border:1px solid var(--line);border-radius:9px;background:#FCFAF4;
    font-family:var(--san);font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;
  }
  .btn:hover{border-color:var(--cinnabar);color:var(--cinnabar)}
  .btn.active{background:var(--cinnabar);border-color:var(--cinnabar);color:#FBEFE2}
  .btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7}

  /* ---------- Map + stage ---------- */
  .stage{position:relative;flex:1 1 auto;min-height:0}
  #map{position:absolute;inset:0;background:var(--ocean)}
  .leaflet-container{font-family:var(--san);background:var(--ocean)}

  /* legend */
  .legend{
    position:absolute;left:12px;bottom:20px;z-index:600;
    background:rgba(252,250,244,.94);backdrop-filter:blur(6px);
    border:1px solid var(--line);border-radius:11px;padding:10px 12px;
    box-shadow:0 6px 20px var(--shadow);font-size:12px;line-height:1.5;max-width:200px;
  }
  .legend h4{margin:0 0 7px;font-family:var(--serif);font-size:13px;font-weight:600;letter-spacing:.01em}
  .legend .row{display:flex;align-items:center;gap:8px;color:var(--ink-soft)}
  .legend .row+.row{margin-top:4px}
  .dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto;
    box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .dot.m{background:var(--cinnabar)}
  .dot.c{background:var(--jade)}
  .dot.a{background:#FCFAF4;border:2px dashed var(--gold)}

  /* ---------- List drawer ---------- */
  #list{
    position:absolute;top:0;left:0;bottom:0;width:330px;max-width:84vw;z-index:700;
    background:linear-gradient(180deg,#FCFAF4,var(--paper));
    border-right:1px solid var(--line);box-shadow:8px 0 30px rgba(33,26,20,.10);
    transform:translateX(-104%);transition:transform .32s cubic-bezier(.22,.8,.3,1);
    display:flex;flex-direction:column;
  }
  #list.open{transform:translateX(0)}
  .list-head{padding:13px 16px 10px;border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;gap:8px}
  .list-head h3{font-family:var(--serif);font-weight:600;font-size:17px;margin:0}
  .list-head .n{font-size:12px;color:var(--ink-soft)}
  .list-head .x{margin-left:auto;border:0;background:transparent;font-size:22px;
    line-height:1;color:var(--ink-soft);cursor:pointer;padding:0 2px}
  .list-scroll{overflow-y:auto;flex:1;overscroll-behavior:contain}
  .item{padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer;
    transition:background .12s;position:relative}
  .item:hover{background:rgba(194,64,28,.06)}
  .item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--lang,var(--cinnabar))}
  .item .nm{font-weight:500;font-size:14px;line-height:1.25;margin-bottom:2px;
    padding-left:6px}
  .item .meta{font-size:12px;color:var(--ink-soft);padding-left:6px;
    display:flex;flex-wrap:wrap;gap:4px 9px}
  .item .meta .pct{color:var(--cinnabar);font-weight:500}
  .empty{padding:30px 18px;text-align:center;color:var(--ink-soft);font-size:13.5px;line-height:1.6}

  /* ---------- Popups ---------- */
  .leaflet-popup-content-wrapper{border-radius:13px;box-shadow:0 10px 34px rgba(33,26,20,.24);
    border:1px solid var(--line);padding:2px}
  .leaflet-popup-content{margin:13px 15px 14px;font-family:var(--san);width:248px!important}
  .leaflet-popup-tip{box-shadow:none}
  .pop .lang{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;padding:3px 8px;border-radius:20px;color:#fff;margin-bottom:7px}
  .pop h3{font-family:var(--serif);font-size:17px;font-weight:600;margin:0 0 3px;line-height:1.18;color:var(--ink)}
  .pop .dist{font-size:12px;color:var(--ink-soft);margin-bottom:9px}
  .pop dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:12.5px}
  .pop dt{color:var(--ink-soft)}
  .pop dd{margin:0;color:var(--ink);font-weight:500}
  .pop .addr{margin:9px 0 0;font-size:12px;color:var(--ink-soft);line-height:1.4;
    padding-top:9px;border-top:1px solid var(--line)}
  .pop .approx{display:block;margin-top:5px;color:var(--gold);font-size:11px;font-weight:600}
  .pop a.web{display:inline-flex;align-items:center;gap:5px;margin-top:10px;
    color:var(--cinnabar);font-weight:600;font-size:12.5px;text-decoration:none}
  .pop a.web:hover{text-decoration:underline}
  .pop a.web svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8}

  /* ---------- Cluster ---------- */
  .cl{background:transparent}
  .cl div{
    width:100%;height:100%;border-radius:50%;display:grid;place-items:center;
    color:#FBEFE2;font-family:var(--san);font-weight:700;font-size:12px;
    background:radial-gradient(circle at 32% 30%, var(--cinnabar), var(--cinnabar-deep));
    box-shadow:0 3px 10px rgba(154,48,20,.45), 0 0 0 4px rgba(194,64,28,.18);
  }
  .pin{filter:drop-shadow(0 2px 2px rgba(0,0,0,.3))}

  @media(max-width:560px){
    h1{font-size:19px} .seal{width:36px;height:36px;font-size:22px}
    .sub{display:none} .count b{font-size:22px}
    .legend{bottom:14px;left:10px;padding:8px 10px;font-size:11px}
    .controls{padding:8px 10px;gap:6px}
    select{flex:1 1 auto}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="seal">中</div>
    <div class="titles">
      <h1>Chinese Immersion <em>Atlas</em></h1>
      <div class="sub">Mandarin &amp; Cantonese dual-language schools, mapped from the MIP directory</div>
    </div>
    <div class="count"><b id="cnt">0</b><span>schools shown</span></div>
  </header>

  <div class="controls">
    <button class="btn" id="listBtn" title="Browse list">
      <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      List
    </button>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Search school, city, state…" autocomplete="off"/>
      <button class="clr" id="clr" aria-label="clear">×</button>
    </div>
    <select id="scope" aria-label="Region">
      <option value="">All regions</option>
      <option value="USA">United States</option>
      <option value="INTL">International</option>
    </select>
    <select id="lang" aria-label="Language">
      <option value="">All languages</option>
      <option value="Mandarin">Mandarin</option>
      <option value="Cantonese">Cantonese</option>
    </select>
    <select id="type" aria-label="School type">
      <option value="">All types</option>
      <option value="Public">Public</option>
      <option value="Charter">Charter</option>
      <option value="Private">Private</option>
    </select>
  </div>

  <div class="stage">
    <div id="map"></div>

    <aside id="list">
      <div class="list-head">
        <h3>Schools</h3><span class="n" id="listN"></span>
        <button class="x" id="listX" aria-label="close">×</button>
      </div>
      <div class="list-scroll" id="listScroll"></div>
    </aside>

    <div class="legend">
      <h4>Legend</h4>
      <div class="row"><span class="dot m"></span> Mandarin program</div>
      <div class="row"><span class="dot c"></span> Cantonese program</div>
      <div class="row"><span class="dot a"></span> Approx. (city/country)</div>
    </div>
  </div>
</div>

at":40.347,"lng":-111.915,"n":2},{"name":"Schaumburg","lat":42.009,"lng":-88.093,"n":2},{"name":"Shanghai","lat":31.23,"lng":121.474,"n":2},{"name":"Springville","lat":40.225,"lng":-111.492,"n":2},{"name":"Syracuse","lat":41.084,"lng":-112.079,"n":2},{"name":"Tucson","lat":32.173,"lng":-110.839,"n":2},{"name":"West Columbia","lat":33.991,"lng":-81.101,"n":2},{"name":"West Covina","lat":34.066,"lng":-117.915,"n":2},{"name":"West Linn","lat":45.341,"lng":-122.662,"n":2},{"name":"Abbotsford","lat":-37.803,"lng":144.998,"n":1},{"name":"Anaheim","lat":33.826,"lng":-117.91,"n":1}]};
const C_MANDARIN = '#C2401C', C_CANTONESE = '#1F7A5E', C_GOLD = '#B5862A';

const map = L.map('map', { zoomControl:false, worldCopyJump:true, minZoom:2, maxZoom:18,
  preferCanvas:true })
  .setView([39.5, -98.3], 4);
L.control.zoom({ position:'topright' }).addTo(map);
const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

// ---- LIVE base tiles (work when the file is opened in a normal browser) ----
const OSM_ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>';
const CARTO_ATTR = OSM_ATTR + ' &copy; <a href="https://carto.com/attributions">CARTO</a>';
const baseLayers = {
  'Streets': L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    { subdomains:'abcd', maxZoom:19, attribution:CARTO_ATTR }),
  'Light': L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    { subdomains:'abcd', maxZoom:19, attribution:CARTO_ATTR }),
  'OpenStreetMap': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom:19, attribution:OSM_ATTR }),
};
const primary = baseLayers['Streets'];
primary.addTo(map);
L.control.layers(baseLayers, null, { position:'topright', collapsed:true }).addTo(map);

// ---- OFFLINE fallback: embedded outlines + labels, shown only if tiles can't load ----
// (keeps the map usable inside sandboxes or with no internet)
let tileOkCount = 0, tileErrCount = 0, fallbackShown = false, decided = false;
function showFallback(){
  if (fallbackShown || decided) return;
  decided = true; fallbackShown = true;
  const r = L.canvas({ padding:0.5 });
  L.geoJSON(WORLD, { renderer:r, interactive:false, pane:'tilePane',
    style:{ fillColor:cssVar('--land'), fillOpacity:1, color:cssVar('--border'), weight:1 } }).addTo(map);
  L.geoJSON(STATES, { renderer:r, interactive:false, pane:'tilePane',
    style:{ fill:false, color:cssVar('--stateline'), weight:0.8, opacity:1 } }).addTo(map);
  map.attributionControl.addAttribution('Boundaries &copy; <a href="https://www.naturalearthdata.com">Natural Earth</a>');

  const lbl = (o, cls, inner) => L.marker([o.lat,o.lng], { interactive:false, keyboard:false,
    icon: L.divIcon({ className:cls, html:inner, iconSize:[0,0] }) });
  const countryLayer = L.layerGroup(LABELS.countries.map(o=>lbl(o,'lbl-country',`<span>${o.name}</span>`)));
  const stateLayer   = L.layerGroup(LABELS.states.map(o=>lbl(o,'lbl-state',`<span>${o.name}</span>`)));
  const cityLayer    = L.layerGroup(LABELS.cities.map(o=>lbl(o,'lbl-city',`<i></i><b>${o.name}</b>`)));
  const tog = (layer,on)=>{ const h=map.hasLayer(layer); if(on&&!h)layer.addTo(map); else if(!on&&h)map.removeLayer(layer); };
  const sync = ()=>{ const z=map.getZoom(); tog(countryLayer,z<=5); tog(stateLayer,z>=5&&z<=8); tog(cityLayer,z>=6); };
  map.on('zoomend', sync); sync();
}
// A real, successfully-rendered tile fires 'tileload'. A blocked/failed one fires 'tileerror'.
// 'load' is NOT a success signal (it fires after tiles settle, even on error).
Object.values(baseLayers).forEach(t=>{
  t.on('tileload', ()=>{ tileOkCount++; decided = true; });   // tiles work -> never fall back
  t.on('tileerror', ()=>{ tileErrCount++;
    setTimeout(()=>{ if(tileOkCount === 0) showFallback(); }, 1200); });
});
// safety net: if after 4s not a single tile rendered, use the offline basemap
setTimeout(()=>{ if(tileOkCount === 0) showFallback(); }, 4000);

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function pinIcon(s){
  const col = s.language==='Cantonese'?C_CANTONESE:C_MANDARIN;
  const fill = s.approx ? '#FCFAF4' : col;
  const stroke = s.approx ? C_GOLD : '#FBEFE2';
  const dash = s.approx ? 'stroke-dasharray="2.4 2"' : '';
  const inner = s.approx ? '' : `<circle cx="12" cy="9.5" r="3.1" fill="${stroke}"/>`;
  return L.divIcon({
    className:'pin', iconSize:[24,32], iconAnchor:[12,31], popupAnchor:[0,-28],
    html:`<svg width="24" height="32" viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 1C6.2 1 1.6 5.6 1.6 11.4 1.6 19 12 31 12 31S22.4 19 22.4 11.4C22.4 5.6 17.8 1 12 1Z"
        fill="${fill}" stroke="${s.approx?C_GOLD:'rgba(0,0,0,.18)'}" stroke-width="${s.approx?1.6:1}" ${dash}/>${inner}</svg>`
  });
}

function popupHTML(s){
  const col = s.language==='Cantonese'?C_CANTONESE:C_MANDARIN;
  let dl='';
  const add=(k,v)=>{ if(v) dl+=`<dt>${k}</dt><dd>${esc(v)}</dd>`; };
  add('Type', s.type);
  add('Grades', s.grades);
  if(s.mandarin) dl+=`<dt>Mandarin</dt><dd style="color:${col}">${esc(s.mandarin)} time</dd>`;
  add('Model', s.model);
  add('Started', s.year);
  add('Phone', s.phone);
  add('Other lang.', s.otherLang);
  const loc = [s.city, s.state, s.country!=='USA'?s.country:''].filter(Boolean).join(', ');
  const addr = [s.address, loc].filter(Boolean).join(' · ');
  let web='';
  if(s.website){ let u=s.website; if(!/^https?:/i.test(u)) u='https://'+u;
    web=`<a class="web" href="${esc(u)}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M10 14a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1"/><path d="M14 10a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg>
      Visit website</a>`; }
  return `<div class="pop">
    <span class="lang" style="background:${col}">${esc(s.language)}</span>
    <h3>${esc(s.name)}</h3>
    ${s.district?`<div class="dist">${esc(s.district)}</div>`:''}
    <dl>${dl}</dl>
    ${addr?`<div class="addr">${esc(addr)}${s.approx?'<span class="approx">◦ Approximate location (city/country level)</span>':''}</div>`:''}
    ${web}
  </div>`;
}

const cluster = L.markerClusterGroup({
  maxClusterRadius:46, spiderfyOnMaxZoom:true, showCoverageOnHover:false,
  iconCreateFunction(c){
    const n=c.getChildCount();
    const size = n<10?34 : n<50?42 : n<150?52 : 60;
    return L.divIcon({ className:'cl',
      html:`<div style="font-size:${n>99?12:13}px">${n}</div>`,
      iconSize:[size,size] });
  }
});

const markers = SCHOOLS.map(s=>{
  const m = L.marker([s.lat, s.lng], { icon: pinIcon(s) });
  m.bindPopup(popupHTML(s), { closeButton:true, maxWidth:280 });
  m._s = s;
  return m;
});

// ---- filtering ----
const $=id=>document.getElementById(id);
const q=$('q'), scope=$('scope'), lang=$('lang'), typeF=$('type');
let filtered = markers;

function passes(s){
  const term = q.value.trim().toLowerCase();
  if(scope.value==='USA' && s.country!=='USA') return false;
  if(scope.value==='INTL' && s.country==='USA') return false;
  if(lang.value && s.language!==lang.value) return false;
  if(typeF.value && s.type!==typeF.value) return false;
  if(term){
    const hay=(s.name+' '+s.city+' '+s.state+' '+s.country+' '+s.district).toLowerCase();
    if(!hay.includes(term)) return false;
  }
  return true;
}

function apply(){
  filtered = markers.filter(m=>passes(m._s));
  cluster.clearLayers();
  cluster.addLayers(filtered);
  $('cnt').textContent = filtered.length;
  $('clr').style.display = q.value ? 'block':'none';
  renderList();
}

map.addLayer(cluster);

// ---- list drawer ----
const listEl=$('list'), scrollEl=$('listScroll');
function renderList(){
  $('listN').textContent = `(${filtered.length})`;
  if(!filtered.length){ scrollEl.innerHTML='<div class="empty">No schools match these filters.<br>Try clearing the search.</div>'; return; }
  const sorted=[...filtered].sort((a,b)=>a._s.name.localeCompare(b._s.name));
  const frag=document.createDocumentFragment();
  sorted.forEach(m=>{
    const s=m._s, col=s.language==='Cantonese'?C_CANTONESE:C_MANDARIN;
    const div=document.createElement('div');
    div.className='item'; div.style.setProperty('--lang',col);
    const where=[s.city,s.state,s.country!=='USA'?s.country:''].filter(Boolean).join(', ');
    div.innerHTML=`<div class="nm">${esc(s.name)}</div>
      <div class="meta"><span>${esc(where)}</span>${s.type?`<span>${esc(s.type)}</span>`:''}${s.mandarin?`<span class="pct">${esc(s.mandarin)}</span>`:''}</div>`;
    div.onclick=()=>{
      if(window.innerWidth<700) toggleList(false);
      map.flyTo([s.lat,s.lng], Math.max(map.getZoom(),11), {duration:.8});
      setTimeout(()=>{ cluster.zoomToShowLayer(m, ()=>m.openPopup()); }, 360);
    };
    frag.appendChild(div);
  });
  scrollEl.innerHTML=''; scrollEl.appendChild(frag);
}
function toggleList(force){
  const open = force===undefined ? !listEl.classList.contains('open') : force;
  listEl.classList.toggle('open', open);
  $('listBtn').classList.toggle('active', open);
}
$('listBtn').onclick=()=>toggleList();
$('listX').onclick=()=>toggleList(false);

[q,scope,lang,typeF].forEach(el=>el.addEventListener('input',apply));
$('clr').onclick=()=>{ q.value=''; apply(); q.focus(); };

apply();
// fit to US on load (where the bulk is) but keep world visible
map.setView([39.5,-98.3], 4);
</script>
